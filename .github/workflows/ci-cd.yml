name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
  pull_request:
    branches:
      - main
      - develop

env:
  AWS_REGION: eu-central-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.eu-central-1.amazonaws.com
  IMAGE_TAG: ${{ github.sha }}

jobs:
  quality:
    name: Code Quality
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: lumio_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install FFmpeg
        run: sudo apt-get install -y --fix-missing ffmpeg

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: |
          uv pip install --system -e ".[dev]"

      - name: Lint with flake8
        run: |
          flake8 apps config --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 apps config --count --exit-zero --max-complexity=10 --max-line-length=100

      - name: Format check with black
        run: black --check apps config

      - name: Type check with mypy
        run: mypy apps config --ignore-missing-imports
        continue-on-error: true

      - name: Run tests with pytest
        run: |
          pytest --cov=apps --cov-report=xml --cov-report=html -v
        env:
          DB_NAME: lumio_test
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_HOST: localhost
          DB_PORT: "5432"
          REDIS_URL: redis://localhost:6379/0
          DJANGO_SETTINGS_MODULE: config.settings.test
          DJANGO_SECRET_KEY: ci-test-secret-key
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: eu-central-1
          S3_RAW_BUCKET: lumio-raw-uploads
          S3_PROCESSED_BUCKET: lumio-processed-media
          S3_ASSETS_BUCKET: lumio-assets-674544924217
          CLOUDFRONT_KEY_PAIR_ID: ${{ secrets.CLOUDFRONT_KEY_PAIR_ID }}
          CLOUDFRONT_PRIVATE_KEY_B64: ${{ secrets.CLOUDFRONT_PRIVATE_KEY_B64 }}
          CLOUDFRONT_DOMAIN: ${{ secrets.CLOUDFRONT_DOMAIN }}

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  build:
    name: Build Docker Images
    needs: quality
    runs-on: ubuntu-latest
    if: success()

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}

      - name: Create ECR repositories if they don't exist
        run: |
          for repo in lumio-app lumio-celery lumio-ffmpeg; do
            aws ecr describe-repositories --repository-names $repo --region ${{ env.AWS_REGION }} 2>/dev/null || \
            aws ecr create-repository --repository-name $repo --region ${{ env.AWS_REGION }} --image-tag-mutability MUTABLE
          done

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-options: network=host

      - name: Build and push Django app image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/lumio-app:${{ env.IMAGE_TAG }}
            ${{ env.ECR_REGISTRY }}/lumio-app:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Celery worker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.celery
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/lumio-celery:${{ env.IMAGE_TAG }}
            ${{ env.ECR_REGISTRY }}/lumio-celery:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push FFmpeg worker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.ffmpeg
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/lumio-ffmpeg:${{ env.IMAGE_TAG }}
            ${{ env.ECR_REGISTRY }}/lumio-ffmpeg:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Production
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://api.lumio.io

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.7.0

      - name: Terraform Init
        run: |
          cd terraform
          terraform init -backend-config="bucket=lumio-tf-state-674544924217" \
                         -backend-config="key=lumio/terraform.tfstate" \
                         -backend-config="region=${{ env.AWS_REGION }}" \
                         -backend-config="dynamodb_table=lumio-tflock"

      - name: Terraform Plan
        run: |
          cd terraform
          terraform plan -var-file="environments/production.tfvars" \
                         -var="image_tag=${{ env.IMAGE_TAG }}" \
                         -var="django_secret_key=${{ secrets.DJANGO_SECRET_KEY }}" \
                         -var="db_password=${{ secrets.DB_PASSWORD }}" \
                         -var="resend_api_key=${{ secrets.RESEND_API_KEY }}" \
                         -var="cloudfront_key_pair_id=${{ secrets.CLOUDFRONT_KEY_PAIR_ID }}" \
                         -var="cloudfront_private_key_b64=${{ secrets.CLOUDFRONT_PRIVATE_KEY_B64 }}" \
                         -out=tfplan

      - name: Terraform Apply
        run: |
          cd terraform
          terraform apply -auto-approve tfplan

      - name: Run Django migrations
        run: |
          aws ecs run-task \
            --cluster lumio \
            --task-definition lumio-app \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=$(aws ec2 describe-subnets --filters Name=tag:Name,Values=lumio-production-private-* --query 'Subnets[0].SubnetId' --output text),securityGroups=$(aws ec2 describe-security-groups --filters Name=tag:Name,Values=lumio-production-app-sg --query 'SecurityGroups[0].GroupId' --output text),assignPublicIp=DISABLED}" \
            --overrides '{"containerOverrides":[{"name":"lumio-app","command":["python","manage.py","migrate","--noinput"]}]}' \
            --region ${{ env.AWS_REGION }}

      - name: Force ECS Deployment
        run: |
          aws ecs update-service --cluster lumio \
                                 --service lumio-app \
                                 --force-new-deployment \
                                 --region ${{ env.AWS_REGION }}

      - name: Wait for ECS service to stabilize
        run: |
          aws ecs wait services-stable --cluster lumio \
                                       --services lumio-app \
                                       --region ${{ env.AWS_REGION }}

      - name: Deployment summary
        if: always()
        run: |
          echo "Deployment ${{ job.status }} for commit ${{ github.sha }}"
