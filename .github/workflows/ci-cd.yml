name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
  pull_request:
    branches:
      - main
      - develop

env:
  AWS_REGION: eu-central-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.eu-central-1.amazonaws.com
  IMAGE_TAG: ${{ github.sha }}

jobs:
  quality:
    name: Code Quality
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: lumio_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install FFmpeg (static build)
        run: |
          wget -q https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-linux64-gpl.tar.xz
          tar xf ffmpeg-master-latest-linux64-gpl.tar.xz
          sudo mv ffmpeg-master-latest-linux64-gpl/bin/ffmpeg /usr/local/bin/
          sudo mv ffmpeg-master-latest-linux64-gpl/bin/ffprobe /usr/local/bin/
          rm -rf ffmpeg-master-latest-linux64-gpl*
          ffmpeg -version

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: |
          uv pip install --system -e ".[dev]"

      - name: Lint with flake8
        run: |
          flake8 apps config --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 apps config --count --exit-zero --max-complexity=10 --max-line-length=100

      - name: Type check with mypy
        run: mypy apps config --ignore-missing-imports
        continue-on-error: true

      # Unit tests disabled — E2E integration tests run after deploy (integration-tests job)
      # - name: Run tests with pytest
      #   run: |
      #     pytest --cov=apps --cov-report=xml --cov-report=html -v
      #   env:
      #     DB_NAME: lumio_test
      #     DB_USER: postgres
      #     DB_PASSWORD: postgres
      #     DB_HOST: localhost
      #     DB_PORT: "5432"
      #     REDIS_URL: redis://localhost:6379/0
      #     DJANGO_SETTINGS_MODULE: config.settings.test
      #     DJANGO_SECRET_KEY: ci-test-secret-key
      #     AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      #     AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      #     AWS_REGION: eu-central-1
      #     S3_RAW_BUCKET: lumio-raw-uploads
      #     S3_PROCESSED_BUCKET: lumio-processed-media
      #     S3_ASSETS_BUCKET: lumio-assets-674544924217
      #     CLOUDFRONT_KEY_PAIR_ID: ${{ secrets.CLOUDFRONT_KEY_PAIR_ID }}
      #     CLOUDFRONT_PRIVATE_KEY_B64: ${{ secrets.CLOUDFRONT_PRIVATE_KEY_B64 }}
      #     CLOUDFRONT_DOMAIN: ${{ secrets.CLOUDFRONT_DOMAIN }}
      #     RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      #     STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
      #     STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
      #     STRIPE_PLATFORM_SHARE_PCT: "20"

      # - name: Upload coverage to Codecov
      #   uses: codecov/codecov-action@v3
      #   with:
      #     file: ./coverage.xml
      #     fail_ci_if_error: false

  build:
    name: Build Docker Images
    needs: quality
    runs-on: ubuntu-latest
    if: success()

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}

      - name: Create ECR repositories if they don't exist
        run: |
          for repo in lumio-app lumio-celery lumio-ffmpeg; do
            aws ecr describe-repositories --repository-names $repo --region ${{ env.AWS_REGION }} 2>/dev/null || \
            aws ecr create-repository --repository-name $repo --region ${{ env.AWS_REGION }} --image-tag-mutability MUTABLE
          done

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Django app image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/lumio-app:${{ env.IMAGE_TAG }}
            ${{ env.ECR_REGISTRY }}/lumio-app:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Celery worker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.celery
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/lumio-celery:${{ env.IMAGE_TAG }}
            ${{ env.ECR_REGISTRY }}/lumio-celery:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push FFmpeg worker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.ffmpeg
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/lumio-ffmpeg:${{ env.IMAGE_TAG }}
            ${{ env.ECR_REGISTRY }}/lumio-ffmpeg:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Production
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://api.lumio.io

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.7.0

      - name: Terraform Init
        run: |
          cd terraform
          terraform init -backend-config="bucket=lumio-tf-state-674544924217" \
                         -backend-config="key=lumio/terraform.tfstate" \
                         -backend-config="region=${{ env.AWS_REGION }}" \
                         -backend-config="dynamodb_table=lumio-tflock"

      - name: Terraform Plan
        run: |
          cd terraform
          terraform plan -var-file="environments/production.tfvars" \
                         -var="image_tag=${{ env.IMAGE_TAG }}" \
                         -var="django_secret_key=${{ secrets.DJANGO_SECRET_KEY }}" \
                         -var="db_password=${{ secrets.DB_PASSWORD }}" \
                         -var="resend_api_key=${{ secrets.RESEND_API_KEY }}" \
                         -var="cloudfront_key_pair_id=${{ secrets.CLOUDFRONT_KEY_PAIR_ID }}" \
                         -var="cloudfront_private_key_b64=${{ secrets.CLOUDFRONT_PRIVATE_KEY_B64 }}" \
                         -var="stripe_secret_key=${{ secrets.STRIPE_SECRET_KEY }}" \
                         -var="stripe_webhook_secret=${{ secrets.STRIPE_WEBHOOK_SECRET }}" \
                         -out=tfplan

      - name: Terraform Apply
        run: |
          cd terraform
          terraform apply -auto-approve tfplan

      - name: Run Django migrations
        run: |
          aws ecs run-task \
            --cluster lumio \
            --task-definition lumio-app \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=$(aws ec2 describe-subnets --filters Name=tag:Name,Values=lumio-production-private-* --query 'Subnets[0].SubnetId' --output text),securityGroups=$(aws ec2 describe-security-groups --filters Name=tag:Name,Values=lumio-production-app-sg --query 'SecurityGroups[0].GroupId' --output text),assignPublicIp=DISABLED}" \
            --overrides '{"containerOverrides":[{"name":"lumio-app","command":["python","manage.py","migrate","--noinput"]}]}' \
            --region ${{ env.AWS_REGION }}

      - name: Force ECS Deployment
        run: |
          aws ecs update-service --cluster lumio \
                                 --service lumio-app \
                                 --force-new-deployment \
                                 --region ${{ env.AWS_REGION }}

      - name: Wait for ECS service to stabilize
        run: |
          echo "Polling ECS until lumio-app is stable (up to 20 min)..."
          for i in $(seq 1 80); do
            STATUS=$(aws ecs describe-services --cluster lumio --services lumio-app \
              --region ${{ env.AWS_REGION }} \
              --query 'services[0].deployments[?status==`PRIMARY`].rolloutState' \
              --output text)
            echo "Attempt $i/80: rolloutState=$STATUS"
            if [ "$STATUS" = "COMPLETED" ]; then
              echo "Service is stable."
              exit 0
            fi
            sleep 15
          done
          echo "Timed out waiting for ECS service to stabilize."
          exit 1

      - name: Deployment summary
        if: always()
        run: |
          echo "Deployment ${{ job.status }} for commit ${{ github.sha }}"

  integration-tests:
    name: Integration Tests (Live Production)
    needs: deploy
    runs-on: ubuntu-latest
    environment:
      name: production

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Run E2E journey tests against production ALB
        run: |
          pytest tests/integration/test_e2e_journeys.py -v --no-cov -m integration --timeout=120
        env:
          LUMIO_TEST_BASE_URL: http://lumio-production-alb-1639211656.eu-central-1.elb.amazonaws.com
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          STRIPE_PLATFORM_SHARE_PCT: "20"
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: eu-central-1
          S3_RAW_BUCKET: lumio-raw-uploads
